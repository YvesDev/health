<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康文档导航</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #e8f5e9 0%, #f3e5f5 50%, #e3f2fd 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  /* ── Hero ── */
  .hero {
    text-align: center;
    margin-bottom: 40px;
  }
  .hero-icon {
    font-size: 52px;
    line-height: 1;
    margin-bottom: 14px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
  }
  .hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 700;
    color: #1b3a2a;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .hero p {
    font-size: 14px;
    color: #5c7a6a;
    letter-spacing: 1px;
  }

  /* ── Groups ── */
  .group {
    width: 100%;
    max-width: 680px;
    margin-bottom: 32px;
  }
  .group-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #7a9e82;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-left: 4px;
  }
  .group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, #a8d4b2, transparent);
  }

  /* ── Cards ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px 22px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 1px solid rgba(255,255,255,0.8);
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }

  /* per-card accent colors */
  .card.sage::before    { background: linear-gradient(90deg, #4e7153, #a8d4b2); }
  .card.violet::before  { background: linear-gradient(90deg, #7b5ea7, #c5aee0); }
  .card.orange::before  { background: linear-gradient(90deg, #e07b39, #f5c09a); }

  .card-emoji {
    font-size: 32px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .card-body {}
  .card-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
    color: #1b3a2a;
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .card-desc {
    font-size: 13px;
    color: #7a9e82;
    line-height: 1.6;
  }
  .card-arrow {
    margin-left: auto;
    font-size: 18px;
    color: #b5ceb8;
    align-self: center;
    flex-shrink: 0;
    transition: color 0.2s, transform 0.2s;
  }
  .card:hover .card-arrow {
    color: #4a8c5c;
    transform: translateX(3px);
  }

  /* ── Footer ── */
  .footer {
    font-size: 12px;
    color: #9fb8a4;
    letter-spacing: 1px;
    margin-top: 8px;
  }
</style>
</head>
<body>

  <div class="hero">
    <div class="hero-icon">🌿</div>
    <h1>健康文档导航</h1>
    <p>选择你想查看的健康文档</p>
  </div>

  <!-- 孕期专题 -->
  <div class="group">
    <div class="group-label">🤰 孕期专题</div>
    <div class="cards">
      <a class="card sage" href="doc/pregnancy-meal-plan.html">
        <span class="card-emoji">🥗</span>
        <div class="card-body">
          <div class="card-title">孕期两周食谱</div>
          <div class="card-desc">营养均衡的孕期两周饮食计划，食材简单易操作</div>
        </div>
        <span class="card-arrow">›</span>
      </a>
      <a class="card violet" href="doc/pregnancy-constipation.html">
        <span class="card-emoji">💊</span>
        <div class="card-body">
          <div class="card-title">孕期便秘的缓解方法</div>
          <div class="card-desc">安全有效的孕期便秘缓解建议与日常调理方法</div>
        </div>
        <span class="card-arrow">›</span>
      </a>
    </div>
  </div>

  <!-- 减脂专题 -->
  <div class="group">
    <div class="group-label">🔥 减脂专题</div>
    <div class="cards">
      <a class="card orange" href="doc/weight-loss-meal-plan.html">
        <span class="card-emoji">🥦</span>
        <div class="card-body">
          <div class="card-title">一周减脂餐计划</div>
          <div class="card-desc">高蛋白·控碳水·1600–1800 kcal/天，七天完整菜单</div>
        </div>
        <span class="card-arrow">›</span>
      </a>
    </div>
  </div>

  <div class="footer">Health &amp; Wellness · YvesDev</div>

</body>
</html>
